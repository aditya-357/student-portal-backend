<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <ul>
            <li onclick="showSection('search')">Search Student</li>
            <li onclick="showSection('add')">Add Student</li>
            <li onclick="showSection('delete')">Delete Student</li>
            <li onclick="showSection('update')">Update Student</li>
            <li onclick="showSection('allocate')">Allocate Hostel</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Top Bar -->
        <div class="topbar">
            <h1>Welcome Admin</h1>
            <button onclick="logoutAdmin()">Logout</button>
        </div>

        <!-- Dynamic Content Area -->
        <div id="content-area">
            <h2>Select a menu option</h2>
        </div>

    </div>

</div>

<script src="/static/js/admin.js"></script>
</body>
</html>
